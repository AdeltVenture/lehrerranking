<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lehrer Ranking">
<meta name="theme-color" content="#fdf6ee">
<title>Lehrer Ranking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #fdf6ee;
  --card:      #ffffff;
  --border:    rgba(180,140,100,0.18);
  --border2:   rgba(180,140,100,0.32);
  --text:      #3a2e24;
  --text2:     #8a7060;
  --text3:     #b8a090;
  --accent:    #e8845a;
  --accent2:   #f5c87a;
  --hero-from: #fde8d4;
  --hero-to:   #fdf0e0;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

#video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  filter: brightness(0.3) saturate(0.5);
  display: none;
  z-index: 0;
}
#cam-overlay {
  position: absolute; inset: 0;
  background: rgba(253,246,238,0.80);
  display: none;
  z-index: 1;
  pointer-events: none;
}

/* ── Hero ── */
#hero {
  flex-shrink: 0;
  position: relative;
  z-index: 2;
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  background: linear-gradient(150deg, var(--hero-from) 0%, var(--hero-to) 100%);
  border-bottom: 1px solid var(--border);
}

/* decorative circles */
#hero::before {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(232,132,90,0.1);
  pointer-events: none;
}
#hero::after {
  content: '';
  position: absolute;
  right: 30px; top: 10px;
  width: 50px; height: 50px;
  border-radius: 50%;
  background: rgba(245,200,122,0.12);
  pointer-events: none;
}

.hero-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 1;
}

.school-logo {
  width: 58px; height: 58px;
  border-radius: 14px;
  background: white;
  border: 1.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(200,130,70,0.15);
  overflow: hidden;
  padding: 4px;
}
.school-logo svg { width: 30px; height: 30px; }

.hero-text { flex: 1; min-width: 0; }
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.hero-sub {
  font-size: 11px;
  color: var(--text2);
  font-weight: 700;
  margin-top: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.hero-btns { display: flex; gap: 6px; flex-shrink: 0; }

.hbtn {
  height: 34px;
  padding: 0 11px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: white;
  color: var(--text2);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  -webkit-appearance: none;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
  white-space: nowrap;
  box-shadow: 0 1px 4px rgba(180,120,60,0.08);
}
.hbtn:active { background: var(--hero-from); }
.hbtn.cam-active { background: var(--accent); color: white; border-color: var(--accent); }

/* ── Progress ── */
#progress-wrap {
  flex-shrink: 0;
  padding: 8px 14px 6px;
  position: relative; z-index: 2;
  display: flex; align-items: center; gap: 10px;
}
#progress-bar-bg {
  flex: 1; height: 5px;
  border-radius: 5px;
  background: var(--border);
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%;
  transition: width 0.35s ease;
}
#progress-label {
  font-size: 11px; color: var(--text3);
  font-weight: 700; white-space: nowrap;
}

/* ── Content ── */
#content {
  flex: 1;
  display: flex;
  gap: 10px;
  overflow: hidden;
  min-height: 0;
  padding: 8px 12px calc(var(--safe-bottom) + 10px);
  position: relative; z-index: 2;
}

/* ── Pool ── */
#pool-wrap {
  width: 104px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#pool-wrap::-webkit-scrollbar { display: none; }

.pool-label {
  font-size: 10px; color: var(--text3);
  text-align: center; text-transform: uppercase;
  letter-spacing: 0.1em; font-weight: 700;
  margin-bottom: 2px; flex-shrink: 0;
}

.icon-card {
  width: 100px; height: 54px;
  border-radius: 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  display: flex; flex-direction: row;
  align-items: center; gap: 8px;
  padding: 0 9px;
  cursor: grab; touch-action: none; flex-shrink: 0;
  transition: opacity 0.2s, box-shadow 0.15s;
  box-shadow: 0 1px 6px rgba(180,120,60,0.07);
}
.icon-card.placed  { opacity: 0.15; pointer-events: none; }
.icon-card.dragging { opacity: 0.15; }
.icon-card .lname {
  font-size: 11.5px; color: var(--text);
  font-weight: 700; line-height: 1.25;
}

/* ── Ranking ── */
#ranking-wrap {
  flex: 1;
  display: flex; flex-direction: column; gap: 5px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none; min-height: 0;
}
#ranking-wrap::-webkit-scrollbar { display: none; }

.rank-row {
  display: flex; align-items: center;
  gap: 7px; flex-shrink: 0; height: 50px;
}

.rank-num {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
  color: var(--text3); width: 22px;
  text-align: right; flex-shrink: 0; line-height: 1;
}
.rank-num.top3 { color: var(--accent); }

.rank-slot {
  flex: 1; height: 48px;
  border-radius: 14px;
  border: 1.5px dashed var(--border2);
  background: rgba(255,255,255,0.6);
  display: flex; align-items: center;
  padding: 0 10px; gap: 10px;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  touch-action: none; cursor: default;
}
.rank-slot.drag-over {
  border-color: var(--accent);
  background: rgba(232,132,90,0.08);
  border-style: solid;
  box-shadow: 0 0 0 3px rgba(232,132,90,0.14);
}
.rank-slot.filled {
  border-style: solid; border-color: var(--border2);
  background: var(--card); cursor: grab;
  box-shadow: 0 1px 8px rgba(180,120,60,0.09);
}
.rank-slot.gold   { border-color:#e6b84a; background:#fffbf0; box-shadow:0 1px 8px rgba(230,184,74,0.2); }
.rank-slot.silver { border-color:#b0b8c4; background:#f8f9fb; box-shadow:0 1px 8px rgba(160,170,185,0.15); }
.rank-slot.bronze { border-color:#d4956a; background:#fdf5ef; box-shadow:0 1px 8px rgba(212,149,106,0.15); }

.slot-name { font-size: 14px; color: var(--text); font-weight: 700; line-height: 1.3; }
.medal { font-size: 17px; margin-left: auto; }

.av {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; flex-shrink: 0;
}

/* ── Float ── */
#float {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 100px; height: 54px;
  border-radius: 14px;
  background: white;
  border: 2px solid var(--accent);
  display: none; flex-direction: row;
  align-items: center; gap: 8px; padding: 0 9px;
  box-shadow: 0 8px 28px rgba(180,100,50,0.22);
  transform: scale(1.06);
}
#float .lname { font-size: 11.5px; color: var(--text); font-weight: 700; line-height: 1.25; }
</style>
</head>

<script>
const teachers = [
  { id:'lappy',    label:'Fr. Lappy',    initials:'LA', color:'#c45a80', bg:'#fde8f0' },
  { id:'goetze',   label:'Fr. Götze',    initials:'GÖ', color:'#2a8a78', bg:'#e0f5f0' },

const medals = ['🥇','🥈','🥉'];
const medalClass = ['gold','silver','bronze'];
const ranking = new Array(10).fill(null);
let dragId = null, dragFrom = null, offX = 0, offY = 0;
const floatEl = document.getElementById('float');

function getT(id) { return teachers.find(x => x.id === id); }

function updateProgress() {
  const n = ranking.filter(Boolean).length;
  document.getElementById('progress-bar-fill').style.width = (n*10) + '%';
  document.getElementById('progress-label').textContent = n + ' / 10';
}

const poolWrap = document.getElementById('pool-wrap');
teachers.forEach(t => {
  const el = document.createElement('div');
  el.className = 'icon-card';
  el.id = 'pool-' + t.id;
  el.dataset.id = t.id;
  el.innerHTML = `<div class="av" style="width:30px;height:30px;font-size:11px;background:${t.bg};color:${t.color};">${t.initials}</div><span class="lname">${t.label}</span>`;
  poolWrap.appendChild(el);
  bindDrag(el, null);
});

const rankWrap = document.getElementById('ranking-wrap');
for (let i = 0; i < 10; i++) {
  const row = document.createElement('div');
  row.className = 'rank-row';
  const num = document.createElement('div');
  num.className = 'rank-num' + (i < 3 ? ' top3' : '');
  num.textContent = i + 1;
  const slot = document.createElement('div');
  slot.className = 'rank-slot';
  slot.id = 'slot-' + i;
  row.appendChild(num);
  row.appendChild(slot);
  rankWrap.appendChild(row);
}

function renderSlot(idx, id) {
  const slot = document.getElementById('slot-' + idx);
  slot.innerHTML = '';
  slot.className = 'rank-slot';
  slot.dataset.id = '';
  slot.style.cursor = 'default';
  if (id) {
    const t = getT(id);
    slot.classList.add('filled');
    if (idx < 3) slot.classList.add(medalClass[idx]);
    slot.dataset.id = id;
    slot.style.cursor = 'grab';
    const av = document.createElement('div');
    av.className = 'av';
    av.style.cssText = `width:34px;height:34px;font-size:13px;background:${t.bg};color:${t.color};`;
    av.textContent = t.initials;
    const nm = document.createElement('div');
    nm.className = 'slot-name';
    nm.textContent = t.label;
    slot.appendChild(av);
    slot.appendChild(nm);
    if (idx < 3) {
      const m = document.createElement('div');
      m.className = 'medal';
      m.textContent = medals[idx];
      slot.appendChild(m);
    }
    bindDrag(slot, idx);
  }
  updateProgress();
}

function updatePool(id) { const e = document.getElementById('pool-'+id); if(e) e.classList.add('placed'); }
function freePool(id)   { const e = document.getElementById('pool-'+id); if(e) e.classList.remove('placed'); }

function place(id, toIdx, fromSlot) {
  const displaced = ranking[toIdx];
  if (fromSlot !== null) {
    ranking[fromSlot] = displaced;
    renderSlot(fromSlot, displaced);
  } else {
    if (displaced) freePool(displaced);
  }
  ranking[toIdx] = id;
  renderSlot(toIdx, id);
  updatePool(id);
}

function reset() {
  ranking.fill(null);
  for (let i = 0; i < 10; i++) renderSlot(i, null);
  teachers.forEach(t => freePool(t.id));
}

function bindDrag(el, slotIdx) {
  el.addEventListener('mousedown', e => startDrag(e, el, slotIdx));
  el.addEventListener('touchstart', e => startDrag(e, el, slotIdx), { passive: false });
}

function startDrag(e, el, slotIdx) {
  const id = el.dataset.id;
  if (!id) return;
  dragId = id; dragFrom = slotIdx;
  el.classList.add('dragging');
  const t = getT(id);
  floatEl.innerHTML = `<div class="av" style="width:30px;height:30px;font-size:11px;background:${t.bg};color:${t.color};">${t.initials}</div><span class="lname">${t.label}</span>`;
  floatEl.style.display = 'flex';
  const rect = el.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  offX = cx - rect.left; offY = cy - rect.top;
  moveFloat(cx, cy);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
  e.preventDefault();
}

function moveFloat(cx, cy) {
  floatEl.style.left = (cx - offX) + 'px';
  floatEl.style.top  = (cy - offY) + 'px';
}

function onMove(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  moveFloat(cx, cy);
  document.querySelectorAll('.rank-slot').forEach(s => s.classList.remove('drag-over'));
  const t = slotAt(cx, cy);
  if (t) t.classList.add('drag-over');
  e.preventDefault();
}

function onUp(e) {
  const cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
  document.querySelectorAll('.rank-slot').forEach(s => s.classList.remove('drag-over'));
  const t = slotAt(cx, cy);
  if (t) {
    place(dragId, parseInt(t.id.split('-')[1]), dragFrom);
  } else {
    const src = dragFrom !== null
      ? document.getElementById('slot-' + dragFrom)
      : document.getElementById('pool-' + dragId);
    if (src) src.classList.remove('dragging');
  }
  floatEl.style.display = 'none';
  const pe = document.getElementById('pool-' + dragId);
  if (pe) pe.classList.remove('dragging');
  dragId = null; dragFrom = null;
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup', onUp);
  document.removeEventListener('touchmove', onMove);
  document.removeEventListener('touchend', onUp);
}

function slotAt(cx, cy) {
  for (const s of document.querySelectorAll('.rank-slot')) {
    const r = s.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return s;
  }
  return null;
}

let camOn = false;
document.getElementById('cam-btn').onclick = async function() {
  const video = document.getElementById('video');
  const overlay = document.getElementById('cam-overlay');
  if (!camOn) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      video.srcObject = stream;
      video.style.display = 'block';
      overlay.style.display = 'block';
      this.classList.add('cam-active');
      this.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg> Stop`;
      camOn = true;
    } catch(err) { this.textContent = 'Kein Zugriff'; }
  } else {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    video.style.display = 'none';
    overlay.style.display = 'none';
    this.classList.remove('cam-active');
    this.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg> Cam`;
    camOn = false;
  }
};

document.getElementById('reset-btn').onclick = reset;
updateProgress();
</script>
